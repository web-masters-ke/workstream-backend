name: Build and Deploy workstream-backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --only-verified

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            NODE_ENV=production
            PORT=3000
          tags: |
            ghcr.io/web-masters-ke/workstream-backend:${{ github.sha }}
            ghcr.io/web-masters-ke/workstream-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: wasaa-org-runners
    steps:
      - name: Install yq
        run: |
          mkdir -p "$HOME/bin"
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o "$HOME/bin/yq" && chmod +x "$HOME/bin/yq"
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Checkout Ventures-Helm-Charts
        uses: actions/checkout@v4
        with:
          repository: web-masters-ke/Ventures-Helm-Charts
          ref: development
          token: ${{ secrets.HELM_CHARTS_PAT }}

      - name: Update backend image tag
        run: yq e '.backend.image.tag = "${{ github.sha }}"' -i charts/workstream-service/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/workstream-service/values.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci(workstream-backend): update image tag to ${{ github.sha }}"
          git push

      - name: Trigger ArgoCD sync
        run: |
          curl -sf -X POST http://argocd-server.argocd.svc.cluster.local/api/v1/applications/workstream-service/sync \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"prune":true,"dryRun":false,"force":false}' || true

      - name: Wait for ArgoCD health gate
        run: |
          TIMEOUT=300; INTERVAL=15; ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESPONSE=$(curl -sf http://argocd-server.argocd.svc.cluster.local/api/v1/applications/workstream-service \
              -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" 2>/dev/null || echo '{}')
            SYNC=$(echo "$RESPONSE"   | jq -r '.status.sync.status   // empty')
            HEALTH=$(echo "$RESPONSE" | jq -r '.status.health.status // empty')
            echo "[${ELAPSED}s] sync=${SYNC} health=${HEALTH}"
            [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && exit 0
            sleep $INTERVAL; ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Timeout waiting for workstream-service health"; exit 1
