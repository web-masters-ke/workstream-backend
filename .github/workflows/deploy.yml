name: Deploy workstream-backend to Production EC2 Instance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  build-and-deploy:
    needs: [security-scan, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION_PROD }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ secrets.ECR_REPOSITORY }} --region ${{ secrets.AWS_REGION_PROD }} || \
          aws ecr create-repository --repository-name ${{ secrets.ECR_REPOSITORY }} --region ${{ secrets.AWS_REGION_PROD }}

      - name: Build, tag, and push backend image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --no-cache \
            --build-arg NODE_ENV=production \
            --build-arg "PORT=${{ secrets.CONTAINER_PORT }}" \
            --build-arg "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --build-arg "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --build-arg "JWT_ACCESS_TTL=${{ secrets.JWT_ACCESS_TTL }}" \
            --build-arg "JWT_REFRESH_TTL=${{ secrets.JWT_REFRESH_TTL }}" \
            --build-arg "MEDIA_DRIVER=${{ secrets.MEDIA_DRIVER }}" \
            --build-arg "MEDIA_LOCAL_DIR=${{ secrets.MEDIA_LOCAL_DIR }}" \
            --build-arg "MEDIA_PUBLIC_BASE_URL=${{ secrets.MEDIA_PUBLIC_BASE_URL }}" \
            --build-arg "APP_URL=${{ secrets.APP_URL }}" \
            --build-arg "BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}" \
            --build-arg "BREVO_FROM_EMAIL=${{ secrets.BREVO_FROM_EMAIL }}" \
            --build-arg "EMAIL_FROM_NAME=${{ secrets.EMAIL_FROM_NAME }}" \
            --build-arg "JAAS_APP_ID=${{ secrets.JAAS_APP_ID }}" \
            --build-arg "JAAS_KEY_ID=${{ secrets.JAAS_KEY_ID }}" \
            --build-arg "JAAS_PRIVATE_KEY=${{ secrets.JAAS_PRIVATE_KEY }}" \
            --build-arg "BONGA_SMS_URL=${{ secrets.BONGA_SMS_URL }}" \
            --build-arg "BONGA_API_KEY=${{ secrets.BONGA_API_KEY }}" \
            --build-arg "BONGA_API_SECRET=${{ secrets.BONGA_API_SECRET }}" \
            --build-arg "BONGA_CLIENT_ID=${{ secrets.BONGA_CLIENT_ID }}" \
            --build-arg "BONGA_SERVICE_ID=${{ secrets.BONGA_SERVICE_ID }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:backend-latest \
            -f Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-latest

      - name: Deploy Backend Service to Server via SSM
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy workstream-backend ${{ github.sha }}" \
            --timeout-seconds 300 \
            --parameters 'commands=[
              "echo \"=== Deploying workstream-backend ===\"",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION_PROD }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
              "echo \"=== Pulling latest backend image ===\"",
              "docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:backend-latest",
              "echo \"=== Cleaning up old backup container ===\"",
              "docker rm -f ${{ secrets.SERVICE_NAME }}-backup 2>/dev/null || true",
              "echo \"=== Stopping and backing up current container ===\"",
              "docker stop ${{ secrets.SERVICE_NAME }} 2>/dev/null || true",
              "docker rename ${{ secrets.SERVICE_NAME }} ${{ secrets.SERVICE_NAME }}-backup 2>/dev/null || true",
              "echo \"=== Starting new backend container ===\"",
              "docker run -d --name ${{ secrets.SERVICE_NAME }} --network ${{ secrets.DOCKER_NETWORK }} --add-host=host.docker.internal:host-gateway --restart unless-stopped -p 0.0.0.0:${{ secrets.HOST_PORT }}:${{ secrets.CONTAINER_PORT }} -v /opt/workstream/uploads:/app/uploads ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:backend-latest",
              "echo \"=== Health check (10 attempts) ===\"",
              "HEALTH_OK=false; for i in $(seq 1 10); do HTTP_CODE=$(curl -so /dev/null -w \"%{http_code}\" http://127.0.0.1:${{ secrets.HOST_PORT }}/api/v1/health 2>/dev/null); echo \"Attempt $i/10 — HTTP $HTTP_CODE\"; if [ \"$HTTP_CODE\" != \"000\" ]; then echo \"Health check passed\"; HEALTH_OK=true; break; fi; sleep 6; done",
              "if [ \"$HEALTH_OK\" = true ]; then echo \"=== Deploy successful, removing backup ===\"; docker rm -f ${{ secrets.SERVICE_NAME }}-backup 2>/dev/null || true; echo \"=== Cleaning up old images ===\"; docker images ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }} --format \"{{.Tag}} {{.ID}}\" | grep -v -e \"backend-latest\" -e \"backend-${{ github.sha }}\" | awk \"{print \\$2}\" | sort -u | xargs -r docker rmi 2>/dev/null || true; docker image prune -af --filter \"until=24h\" 2>/dev/null || true; exit 0; fi",
              "echo \"=== Health check failed, rolling back ===\"",
              "docker stop ${{ secrets.SERVICE_NAME }} 2>/dev/null || true",
              "docker rm -f ${{ secrets.SERVICE_NAME }} 2>/dev/null || true",
              "docker rename ${{ secrets.SERVICE_NAME }}-backup ${{ secrets.SERVICE_NAME }} 2>/dev/null || true",
              "docker start ${{ secrets.SERVICE_NAME }} 2>/dev/null || true",
              "echo \"=== Rollback complete ===\"",
              "echo \"=== Pruning dangling images ===\"",
              "docker image prune -af --filter \"until=24h\" 2>/dev/null || true",
              "exit 1"
            ]' \
            --region ${{ secrets.AWS_REGION_PROD }} \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM deployment to complete
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command_id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          REGION="${{ secrets.AWS_REGION_PROD }}"
          MAX_ATTEMPTS=60
          ATTEMPT=0

          echo "Waiting for SSM command $COMMAND_ID to complete..."

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            RESULT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "[Status, StatusDetails]" --output text 2>/dev/null || echo "InProgress Pending")

            STATUS=$(echo "$RESULT" | awk '{print $1}')
            DETAILS=$(echo "$RESULT" | awk '{print $2}')

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — Status: $STATUS ($DETAILS)"

            case "$STATUS" in
              Success)
                echo "=== Deployment completed successfully ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Undeliverable|Terminated)
                echo "=== Deployment FAILED (Status: $STATUS) ==="
                echo "--- STDOUT ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StandardOutputContent" --output text 2>/dev/null || true
                echo "--- STDERR ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StandardErrorContent" --output text 2>/dev/null || true
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "=== Timed out waiting for SSM command ==="
          exit 1
